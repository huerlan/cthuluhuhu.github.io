<!DOCTYPE html>
<html class="no-js" lang="zh-CN">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>你好请点击每一处</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="description" content="">

  <meta property="og:title" content="">
  <meta property="og:type" content="">
  <meta property="og:url" content="">
  <meta property="og:image" content="">
  <meta property="og:image:alt" content="">

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">

  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#fafafa">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      min-height: 100vh;
      background-image: url('img/p2.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'LiXuke', '华文行书', 'Microsoft YaHei', cursive;
      position: relative;
      overflow-x: hidden;
    }

    /* 六个区域的网格布局 */
    .grid-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2rem;
      width: 80%;
      max-width: 1000px;
      padding: 2rem;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(3px);
      border-radius: 30px;
      border: 1px solid rgba(100, 80, 60, 0.6);
    }

    /* 每个可点击区域 */
    .quote-zone {
      background: rgba(20, 15, 10, 0.6);
      border-radius: 20px;
      padding: 1.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(200, 180, 140, 0.3);
      backdrop-filter: blur(2px);
    }

    .quote-zone:hover {
      background: rgba(40, 30, 20, 0.8);
      border-color: rgba(220, 190, 120, 0.8);
      transform: scale(1.02);
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }

    /* 区域内的占位符（初始不可见） */
    .quote-zone span {
      font-size: 1.4rem;
      color: transparent;
      text-shadow: none;
    }

    /* 飘浮文字样式 */
    .floating-text {
      position: fixed;
      pointer-events: none;
      z-index: 2000;
      font-family: 'LiXuke', '华文行书', cursive;
      font-size: 1.5rem;
      color: #d4c5a3;
      text-shadow: 0 0 8px #1e3b2c, 2px 2px 4px black;
      white-space: nowrap;
      opacity: 0;
      animation: floatUp 3s ease-out forwards;
    }

    @keyframes floatUp {
      0% {
        opacity: 0;
        transform: translateY(100vh) scale(0.8);
      }
      20% {
        opacity: 0.9;
      }
      80% {
        opacity: 0.8;
      }
      100% {
        opacity: 0;
        transform: translateY(-20vh) scale(1.2);
      }
    }

    @media (max-width: 700px) {
      .grid-container {
        width: 90%;
        gap: 1rem;
      }
      .quote-zone {
        padding: 1rem;
        min-height: 80px;
      }
      .floating-text {
        font-size: 1rem;
      }
    }
  </style>

</head>
<body>
<div class="grid-container" id="quoteGrid">
  <div class="quote-zone" data-text="你是谁？" data-jump="false"> <span></span> </div>
  <div class="quote-zone" data-text="你为何而来" data-jump="false"> <span></span> </div>
  <div class="quote-zone" data-text="你能否听见我？" data-jump="false"> <span></span> </div>
  <div class="quote-zone" data-text="你又要去哪里？" data-jump="false"> <span></span> </div>
  <div class="quote-zone" data-text="你好" data-jump="false"> <span></span> </div>
  <div class="quote-zone" data-text="你在意这样的目光吗?" data-jump="true"> <span></span> </div>
</div>
<script>
  // ---------- 音乐控制（只播放一次，持续循环）----------
  let musicStarted = false;          // 标记音乐是否已启动
  const bgm = new Audio('audio/oldday.mp3');
  bgm.loop = true;                  // 循环播放
  bgm.volume = 0.6;                // 可选：设置音量

  function startMusic() {
    if (!musicStarted) {
      bgm.play().catch(e => console.log("音乐播放失败:", e));
      musicStarted = true;
    }
  }

  // ---------- 飘浮文字效果 ----------
  function createFloatingText(content, clickX, clickY) {
    const count = 25;
    for (let i = 0; i < count; i++) {
      const floatEl = document.createElement('div');
      floatEl.className = 'floating-text';
      floatEl.innerText = content;
      const randX = Math.random() * window.innerWidth;
      const randY = window.innerHeight * (0.6 + Math.random() * 0.4);
      floatEl.style.left = randX + 'px';
      floatEl.style.top = randY + 'px';
      const duration = 2.5 + Math.random() * 2;
      floatEl.style.animation = `floatUp ${duration}s ease-out forwards`;
      const fontSize = 1.2 + Math.random() * 1.3;
      floatEl.style.fontSize = fontSize + 'rem';
      document.body.appendChild(floatEl);
      floatEl.addEventListener('animationend', () => floatEl.remove());
    }
  }

  // ---------- 处理点击区域 ----------
  const zones = document.querySelectorAll('.quote-zone');
  zones.forEach(zone => {
    zone.addEventListener('click', (e) => {
      e.stopPropagation();
      const text = zone.getAttribute('data-text');
      const shouldJump = zone.getAttribute('data-jump') === 'true';
      const clickX = e.clientX;
      const clickY = e.clientY;

      // 1. 只在第一次点击时启动音乐（后续不会中断或重开）
      startMusic();

      // 2. 满屏飘文字
      createFloatingText(text, clickX, clickY);

      // 3. 如果是“你在意这样的目光吗”，延迟跳转
      if (shouldJump) {
        setTimeout(() => {
          window.location.href = 'introduce.html';
        }, 600);
      }
    });
  });
</script>


</body>
</html>
